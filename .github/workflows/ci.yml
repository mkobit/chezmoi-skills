name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Required to fetch git history for version comparisons

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint markdown
        run: bun run lint:md

      - name: Validate skills and claude configs
        run: bun run validate

      - name: Check version bumps
        if: github.event_name == 'pull_request' && github.base_ref == 'main'
        run: BASE_BRANCH=origin/main bun run checkVersionBump
