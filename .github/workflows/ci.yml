name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint markdown
        run: bun run lint:md

      - name: Validate skills and claude configs
        run: bun run validate
