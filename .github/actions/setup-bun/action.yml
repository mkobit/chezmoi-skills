description: "Sets up Bun environment and installs dependencies"
runs:
  using: "composite"
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.3.11
        cache: true

    - name: Install dependencies
      run: bun install --frozen-lockfile
      shell: bash
