description: "Sets up Bun environment and installs dependencies"
runs:
  using: "composite"
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
      with:
        bun-version: 1.3.14
        cache: true

    - name: Install dependencies
      run: bun install --frozen-lockfile
      shell: bash
